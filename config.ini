[timeouts]
# Таймаут для проверки подключения через Xray (секунды)
xray_timeout = 3
# Таймаут для скачивания источников (секунды)
download_timeout = 15
# Таймаут для TLS-рукопожатия (секунды)
tls_timeout = 2
# Таймаут для TCP-подключения (секунды)
tcp_timeout = 2

[threads]
# Количество параллельных потоков для Xray-проверки
xray_max_workers = 30
# Количество параллельных потоков для скачивания источников
threads_download = 50

[speed]
# URL для проверки скорости и задержки
speed_test_url = https://www.gstatic.com/generate_204
# Количество запросов для измерения средней задержки (в стиле xraycheck)
speed_test_requests = 3
# Строгая проверка VLESS (как в xraycheck): сколько подряд успешных запросов нужно
strong_style_attempts = 3
# Таймаут одного строгого запроса (секунды)
strong_style_timeout = 12
# Максимально допустимое время ответа в строгом режиме (секунды)
strong_max_response_time = 3
# Количество самых быстрых адресов для сохранения в url_work_speed.txt
top_fast_count = 30

[notworkers]
# Включить/отключить систему чёрного списка нерабочих конфигов
notworkers_enabled = true
# Срок хранения записи в чёрном списке (дни)
notworkers_ttl_days = 7
# Минимальное число последовательных провалов для попадания в чёрный список
notworkers_min_fails = 2

[stability]
# Количество дополнительных проверок стабильности после первого успешного запроса
stability_checks = 2
# Пауза между проверками стабильности (секунды)
stability_delay = 1.0

[geolocation]
# Включить/отключить проверку геолокации через Xray-прокси
check_geolocation = false
# Список разрешённых кодов стран через запятую (пусто = все разрешены)
allowed_countries =
# Таймаут запроса геолокации (секунды)
geolocation_timeout = 5

[retry]
# Максимальное количество попыток
max_retries = 3
# Базовая задержка между попытками (секунды)
retry_delay_base = 1.0
# Множитель задержки для экспоненциального увеличения (пример: base=1.0, mult=2.0 → 1s, 2s, 4s)
retry_delay_multiplier = 2.0

[strict]
# Включить/отключить строгий режим проверки (для протоколов кроме VLESS)
strict_mode = false
# Количество последовательных запросов в строгом режиме
strict_attempts = 3
# Максимально допустимое время ответа одного запроса в строгом режиме (секунды)
strict_max_response_time = 3.0
# Общий таймаут для строгого режима (секунды)
strict_timeout = 12
