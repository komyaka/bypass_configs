name: Обновление конфигов VPN

on:
  schedule:
    # Запуск каждые ~60 минут
    # - cron: '0 * * * *'
    # Запуск каждые ~20 минут
    - cron: '*/20 * * * *'
  workflow_dispatch:
    # Ручной запуск через интерфейс GitHub

permissions:
  contents: write

concurrency:
  group: update-configs
  cancel-in-progress: false

jobs:
  update-configs:
    name: Парсинг и обновление конфигов
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Установка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Проверка целостности БД нотворкеров перед запуском
        run: |
          if [ -f "configs/notworkers.db" ]; then
            if python3 -c "import sqlite3; c=sqlite3.connect('configs/notworkers.db'); c.execute('SELECT count(*) FROM notworkers'); c.close()" 2>/dev/null; then
              echo "✅ configs/notworkers.db — целостность OK"
            else
              echo "⚠️ configs/notworkers.db повреждена — удаляю для пересоздания"
              rm -f configs/notworkers.db
            fi
          else
            echo "ℹ️ configs/notworkers.db не существует — будет создана парсером"
          fi

      - name: Запуск парсера (один цикл)
        run: python parser.py --once
        timeout-minutes: 35

      - name: Копирование результатов в папку configs
        run: |
          for file in url_work.txt url_work_speed.txt; do
            if [ -f "$file" ]; then
              cp "$file" "configs/$file"
              echo "✅ $file скопирован"
            else
              echo "⚠️ $file не найден"
            fi
          done

      - name: Публикация результатов в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add configs/url_work.txt configs/url_work_speed.txt
          if [ -f "configs/notworkers.db" ]; then
            git add configs/notworkers.db
            echo "✅ configs/notworkers.db добавлен в коммит"
          else
            echo "⚠️ configs/notworkers.db не найден — файл не будет закоммичен"
          fi
          if ! git diff --staged --quiet; then
            date=$(date -u +"%Y-%m-%d %H:%M")
            git commit -m "auto: обновление конфигов [$date UTC]"
            
            # Пулл с rebase, при конфликтах берём свою версию (свежие данные парсера)
            git pull --rebase -X theirs origin main || {
              # Если rebase всё равно застрял — разрешаем конфликты вручную
              git checkout --theirs configs/url_work.txt configs/url_work_speed.txt 2>/dev/null || true
              git checkout --theirs configs/notworkers.db 2>/dev/null || true
              git add configs/url_work.txt configs/url_work_speed.txt
              if [ -f "configs/notworkers.db" ]; then
                git add configs/notworkers.db
              fi
              git rebase --continue || git rebase --skip
            }
            
            # Проверка целостности БД после rebase (бинарный файл мог повредиться)
            if [ -f "configs/notworkers.db" ]; then
              if ! python3 -c "import sqlite3; c=sqlite3.connect('configs/notworkers.db'); c.execute('SELECT count(*) FROM notworkers'); c.close()" 2>/dev/null; then
                echo "⚠️ configs/notworkers.db повреждена после rebase — удаляю"
                git rm -f configs/notworkers.db 2>/dev/null || rm -f configs/notworkers.db
              fi
            fi
            
            git push
            echo "✅ Конфиги обновлены и опубликованы"
          else
            echo "ℹ️ Новых конфигов нет, коммит не нужен"
          fi
