name: Обновление конфигов VPN

on:
  schedule:
    # Запуск каждые ~25 минут (:00, :25, :50 каждого часа)
    - cron: '0,25,50 * * * *'
  workflow_dispatch:
    # Ручной запуск через интерфейс GitHub

permissions:
  contents: write

jobs:
  update-configs:
    name: Парсинг и обновление конфигов
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Установка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Запуск парсера (один цикл)
        run: python parser.py --once
        timeout-minutes: 20

      - name: Копирование результатов в папку configs
        shell: pwsh
        run: |
          $files = @("url_work.txt", "url_work_speed.txt")
          foreach ($file in $files) {
            if (Test-Path $file) {
              Copy-Item $file "configs\$file" -Force
              Write-Host "✅ $file скопирован"
            } else {
              Write-Host "⚠️ $file не найден"
            }
          }

      - name: Публикация результатов в репозиторий
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add configs/url_work.txt configs/url_work_speed.txt configs/notworkers.json
          $changes = git status --porcelain
          if ($changes) {
            $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm") + " UTC"
            git commit -m "auto: обновление конфигов [$date]"
            git push
            Write-Host "✅ Конфиги обновлены и опубликованы"
          } else {
            Write-Host "ℹ️ Новых конфигов нет, коммит не нужен"
          }
