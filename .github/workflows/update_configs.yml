name: Обновление конфигов VPN

on:
  schedule:
    # Запуск каждые ~60 минут
     - cron: '0 * * * *'
    # Запуск каждые ~20 минут
    #- cron: '*/20 * * * *'
  workflow_dispatch:
    # Ручной запуск через интерфейс GitHub

permissions:
  contents: write

concurrency:
  group: update-configs
  cancel-in-progress: false

jobs:
  update-configs:
    name: Парсинг и обновление конфигов
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Установка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Восстановление notworkers.db из JSON перед запуском
        run: |
          if [ -f "configs/notworkers.json" ]; then
            echo "✅ configs/notworkers.json найден — БД будет восстановлена из него при старте парсера"
          else
            echo "ℹ️ configs/notworkers.json не найден — парсер создаст новую БД"
          fi
          # Удаляем бинарный .db — он всегда пересоздаётся из JSON
          rm -f configs/notworkers.db configs/notworkers.db-wal configs/notworkers.db-shm
          echo "✅ Временные файлы БД очищены"

      - name: Запуск парсера (один цикл)
        run: python parser.py --once
        timeout-minutes: 59

      - name: Копирование результатов в папку configs
        run: |
          for file in url_work.txt url_work_speed.txt; do
            if [ -f "$file" ]; then
              cp "$file" "configs/$file"
              echo "✅ $file скопирован"
            else
              echo "⚠️ $file не найден"
            fi
          done

      - name: Экспорт notworkers в JSON перед коммитом
        run: |
          python3 - <<'EOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from notworkers_db import NotworkersDB
          db_path = "configs/notworkers.db"
          json_path = "configs/notworkers.json"
          if os.path.exists(db_path):
              try:
                  db = NotworkersDB(db_path, json_path)
                  count = db.export_json(json_path, max_records=100000)
                  db.close()
                  print(f"✅ Экспорт завершён: {count} записей → {json_path}")
              except Exception as e:
                  print(f"⚠️ Ошибка экспорта: {e}")
          else:
              print("ℹ️ configs/notworkers.db не найден — экспорт пропущен")
          EOF

      - name: Публикация результатов в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Удаляем SQLite WAL/SHM артефакты и бинарный .db из трекинга git
          rm -f configs/notworkers.db-wal configs/notworkers.db-shm

          # Убедимся что .db не трекается git (на случай если он был закоммичен ранее)
          git rm --cached configs/notworkers.db 2>/dev/null || true

          # Добавляем результаты
          git add configs/url_work.txt configs/url_work_speed.txt

          # Добавляем JSON-экспорт notworkers (вместо бинарного .db)
          if [ -f "configs/notworkers.json" ]; then
            # Проверка размера JSON (не должен превышать 50 МБ)
            MAX_JSON_SIZE=$((50 * 1024 * 1024))
            JSON_SIZE=$(stat -c%s "configs/notworkers.json" 2>/dev/null || echo 0)
            if [ "$JSON_SIZE" -le "$MAX_JSON_SIZE" ]; then
              git add configs/notworkers.json
              echo "✅ configs/notworkers.json добавлен в коммит (${JSON_SIZE} байт)"
            else
              echo "⚠️ configs/notworkers.json слишком большой (${JSON_SIZE} байт > 50MB) — пропускаю"
            fi
          else
            echo "⚠️ configs/notworkers.json не найден — файл не будет закоммичен"
          fi

          if ! git diff --staged --quiet; then
            date=$(date -u +"%Y-%m-%d %H:%M")
            git commit -m "auto: обновление конфигов [$date UTC]"

            # Очищаем все unstaged/untracked файлы из рабочей директории,
            # чтобы git pull --rebase не падал с "You have unstaged changes"
            git stash --include-untracked 2>/dev/null || true

            # Пулл с rebase, при конфликтах берём свою версию
            git pull --rebase -X theirs origin main || {
              # Если rebase застрял — прерываем и делаем обычный merge
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase -X theirs origin main || true
            }

            # Восстанавливаем stash если он был создан
            git stash pop 2>/dev/null || echo "ℹ️ stash pop: нечего восстанавливать или конфликт (не критично)"

            git push
            echo "✅ Конфиги обновлены и опубликованы"
          else
            echo "ℹ️ Новых конфигов нет, коммит не нужен"
          fi
